<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>お小遣い管理帳</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>お小遣い管理帳</h1>
    </header>

    <section class="view-switch" aria-label="表示切替">
      <button id="showListViewBtn" type="button" class="btn active">一覧画面</button>
      <button id="showCalendarViewBtn" type="button" class="btn">カレンダー画面</button>
    </section>

    <p id="messageArea" class="message" role="status" aria-live="polite"></p>
    <div id="deleteUndoArea" class="delete-undo" hidden>
      <button id="undoDeleteBtn" type="button" class="btn">元に戻す</button>
    </div>

    <div id="listView">
      <nav id="sectionMenu" class="section-menu" aria-label="セクション移動メニュー">
        <button type="button" class="section-menu-chip" data-target-section="TOP">TOP</button>
        <button type="button" class="section-menu-chip" data-target-section="recordAddSection">記録追加</button>
        <button type="button" class="section-menu-chip" data-target-section="recordListSection">記録一覧</button>
        <button type="button" class="section-menu-chip" data-target-section="receiverSummarySection">受取人別</button>
        <button type="button" class="section-menu-chip" data-target-section="monthlySummarySection">月別集計</button>
        <button type="button" class="section-menu-chip" data-target-section="statsSection">集計情報</button>
        <button type="button" class="section-menu-chip" data-target-section="settingsSection">設定</button>
      </nav>

      <section id="recordAddSection" class="panel" aria-label="記録追加">
        <h2>記録追加</h2>
        <form id="recordForm" class="record-form" novalidate>
          <label>
            渡した人
            <input id="giver" name="giver" type="text" maxlength="40" list="giverCandidates" required>
            <datalist id="giverCandidates"></datalist>
          </label>

          <label>
            受け取る人
            <input id="receiver" name="receiver" type="text" maxlength="40" list="receiverCandidates" required>
            <datalist id="receiverCandidates"></datalist>
          </label>

          <label>
            金額（円）
            <input id="amount" name="amount" type="number" min="1" step="1" required inputmode="numeric">
          </label>

          <label>
            渡した日時
            <input id="givenAt" name="givenAt" type="datetime-local" required>
          </label>

          <label class="memo-field">
            メモ
            <select id="memoTemplateSelect">
              <option value="">定型メモを選択（任意）</option>
            </select>
            <textarea id="memo" name="memo" rows="3" maxlength="240" placeholder="任意"></textarea>
          </label>

          <label class="record-keep-people">
            <input id="keepLastPeopleCheck" type="checkbox">
            <span>前回の人を保持する（渡した人・受け取る人）</span>
          </label>

          <p id="recordFormModeBadge" class="record-form-mode" hidden>編集中: 未確認レコードを更新します</p>
          <div class="record-form-actions">
            <button id="submitRecordBtn" type="submit" class="btn primary">記録を追加</button>
            <button id="cancelEditBtn" type="button" class="btn" hidden>編集をキャンセル</button>
          </div>
        </form>
      </section>

      <section id="recordListSection" class="panel" aria-label="記録一覧">
        <h2>記録一覧</h2>
        <form id="recordFilterForm" class="record-filter" novalidate>
          <label>
            受取人
            <select id="recordFilterReceiver">
              <option value="ALL">全員</option>
            </select>
          </label>
          <label>
            状態
            <select id="recordFilterStatus">
              <option value="ALL">全件</option>
              <option value="PENDING">未確認</option>
              <option value="DONE">受取確定</option>
            </select>
          </label>
          <label>
            並び替え
            <select id="recordSortSelect">
              <option value="NEW_DESC">新しい順</option>
              <option value="OLD_ASC">古い順</option>
              <option value="AMOUNT_DESC">金額が高い順</option>
              <option value="AMOUNT_ASC">金額が低い順</option>
              <option value="PENDING_FIRST">未確認優先</option>
            </select>
          </label>
          <label>
            月
            <input id="recordFilterMonth" type="month">
          </label>
          <label>
            メモ検索
            <input id="recordFilterKeyword" type="search" maxlength="120" placeholder="メモ内キーワード">
          </label>
          <div class="record-filter-actions">
            <button id="clearRecordFiltersBtn" type="button" class="btn">条件クリア</button>
          </div>
        </form>
        <div id="recordsContainer" class="cards" aria-live="polite"></div>
        <div class="section-backtop">
          <button type="button" class="top-back-link">TOPへ戻る</button>
        </div>
      </section>

      <section id="receiverSummarySection" class="panel" aria-label="受け取った人ごとの一覧">
        <h2>受け取った人ごとの一覧</h2>
        <div class="receiver-summary-controls">
          <label for="receiverSummarySortSelect">
            並び替え
            <select id="receiverSummarySortSelect">
              <option value="NAME_ASC">名前順</option>
              <option value="PENDING_DESC">未確認が多い順</option>
              <option value="AMOUNT_DESC">合計金額が多い順</option>
            </select>
          </label>
        </div>
        <div id="receiverSummary" class="receiver-summary"></div>
        <div class="section-backtop">
          <button type="button" class="top-back-link">TOPへ戻る</button>
        </div>
      </section>

      <section id="monthlySummarySection" class="panel month-summary-panel" aria-label="月ごとの支払合計">
        <h2>月ごとの支払合計</h2>
        <label for="monthlyTargetMonth">
          対象月
          <input id="monthlyTargetMonth" type="month">
        </label>
        <label for="monthlyReceiverFilter">
          受取人
          <select id="monthlyReceiverFilter">
            <option value="ALL">全員</option>
          </select>
        </label>
        <label for="monthlyStatusFilter">
          状態
          <select id="monthlyStatusFilter">
            <option value="ALL">全件</option>
            <option value="PENDING">未確認のみ</option>
            <option value="DONE">受取確定のみ</option>
          </select>
        </label>
        <div class="month-summary-result">
          <p id="monthlyTotalAmount" class="month-summary-amount">¥0</p>
          <p id="monthlyTotalCount" class="month-summary-count">0件</p>
        </div>
        <div class="section-backtop">
          <button type="button" class="top-back-link">TOPへ戻る</button>
        </div>
      </section>

      <section id="statsSection" class="panel" aria-label="集計情報">
        <h2>集計情報</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="label">未確認</span>
            <span id="unreceivedCount" class="value">0件</span>
          </div>
          <div class="stat-card">
            <span class="label">受取確定</span>
            <span id="receivedCount" class="value">0件</span>
          </div>
          <div class="stat-card">
            <span class="label">合計金額</span>
            <span id="totalAmount" class="value">¥0</span>
          </div>
        </div>
        <div class="section-backtop">
          <button type="button" class="top-back-link">TOPへ戻る</button>
        </div>
      </section>

      <section id="settingsSection" class="panel settings-panel" aria-label="設定">
        <h2>設定</h2>

        <nav class="settings-toc" aria-label="設定内メニュー">
          <a class="settings-toc-link" href="#settingsGroupPeople">人の登録</a>
          <a class="settings-toc-link" href="#settingsGroupMemo">メモ定型文</a>
          <a class="settings-toc-link" href="#settingsGroupColor">色設定</a>
          <a class="settings-toc-link" href="#settingsGroupPin">PIN設定</a>
          <a class="settings-toc-link" href="#settingsGroupBackup">バックアップ</a>
        </nav>

        <div id="settingsGroupPeople" class="settings-group" aria-label="人の登録">
          <h3>人の登録</h3>
          <form id="personForm" class="person-form" novalidate>
            <label>
              名前
              <input id="personName" name="personName" type="text" maxlength="40" required>
            </label>
            <label>
              使い方
              <select id="personRole" name="personRole">
                <option value="both">渡す人・受け取る人の両方</option>
                <option value="giver">渡す人のみ</option>
                <option value="receiver">受け取る人のみ</option>
              </select>
            </label>
            <button type="submit" class="btn">登録する</button>
          </form>
          <div class="person-lists">
            <div>
              <p class="person-title">渡す人候補</p>
              <div id="giverPeopleList" class="person-chip-list"></div>
            </div>
            <div>
              <p class="person-title">受け取る人候補</p>
              <div id="receiverPeopleList" class="person-chip-list"></div>
            </div>
          </div>
        </div>

        <div id="settingsGroupMemo" class="settings-group" aria-label="メモ定型文の登録">
          <h3>メモ定型文の登録</h3>
          <form id="memoTemplateForm" class="memo-template-form" novalidate>
            <label>
              定型文
              <input id="memoTemplateInput" name="memoTemplateInput" type="text" maxlength="240" required>
            </label>
            <button type="submit" class="btn">定型文を登録</button>
          </form>
          <p class="person-title">登録済み定型文</p>
          <div id="memoTemplateList" class="person-chip-list"></div>
        </div>

        <div id="settingsGroupColor" class="settings-group" aria-label="受取人ごとの色設定">
          <h3>受取人ごとの色設定</h3>
          <form id="receiverColorForm" class="receiver-color-form" novalidate>
            <label>
              受取人
              <select id="receiverColorTarget"></select>
            </label>
            <label>
              色
              <input id="receiverColorPicker" type="color" value="#4bbcf4">
            </label>
            <div class="receiver-color-actions">
              <button type="submit" class="btn">色を保存</button>
              <button id="resetReceiverColorBtn" type="button" class="btn danger">自動色に戻す</button>
            </div>
          </form>
          <div id="receiverColorList" class="receiver-color-list"></div>
        </div>
        <div class="section-backtop">
          <button type="button" class="top-back-link">TOPへ戻る</button>
        </div>

        <div id="settingsGroupPin" class="settings-group" aria-label="受取人ごとのPIN設定">
          <h3>受取人ごとのPIN設定</h3>
          <form id="receiverPinForm" class="receiver-pin-form" novalidate>
            <label>
              受取人
              <select id="receiverPinTarget"></select>
            </label>
            <label>
              PIN（4桁）
              <input id="receiverPinInput" type="password" maxlength="4" inputmode="numeric" pattern="\d{4}" placeholder="4桁の数字">
            </label>
            <div class="receiver-pin-actions">
              <button type="submit" class="btn">PINを保存/変更</button>
              <button id="deleteReceiverPinBtn" type="button" class="btn danger">PINを削除</button>
            </div>
          </form>
          <p class="pin-note">※PINは端末の localStorage に保存されます。</p>
          <div id="receiverPinList" class="receiver-pin-list"></div>
        </div>

        <div id="settingsGroupBackup" class="settings-group" aria-label="バックアップとデータ管理">
          <h3>バックアップとデータ管理</h3>
          <div class="tool-grid">
            <button id="downloadJsonBtn" type="button" class="btn">JSONバックアップ書き出し</button>
            <button id="downloadCsvBtn" type="button" class="btn">CSV書き出し</button>
            <label class="btn file-btn" for="restoreFileInput">JSONから復元</label>
            <input id="restoreFileInput" type="file" accept="application/json,.json">
            <button id="deleteAllBtn" type="button" class="btn danger">全件削除</button>
          </div>
        </div>
        <div class="section-backtop">
          <button type="button" class="top-back-link">TOPへ戻る</button>
        </div>
      </section>
    </div>

    <div id="calendarView" class="hidden">
      <section class="panel" aria-label="カレンダー">
        <h2>カレンダー表示</h2>
        <div class="calendar-header">
          <button id="prevMonthBtn" type="button" class="btn">前の月</button>
          <p id="calendarMonthLabel" class="calendar-month-label"></p>
          <button id="nextMonthBtn" type="button" class="btn">次の月</button>
        </div>
        <div class="calendar-weekdays">
          <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
        </div>
        <div id="calendarGrid" class="calendar-grid" aria-live="polite"></div>
      </section>

      <section class="panel" aria-label="選択日の記録">
        <h2 id="selectedDateLabel">選択日の記録</h2>
        <div id="calendarRecordsContainer" class="cards" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <template id="recordCardTemplate">
    <article class="record-card">
      <div class="top-row">
        <strong class="amount"></strong>
        <span class="status-badge"></span>
      </div>
      <p class="people"></p>
      <p class="datetime"></p>
      <p class="memo"></p>
      <p class="received-info"></p>
      <div class="actions">
        <button type="button" class="btn confirm-btn">受け取りました</button>
        <button type="button" class="btn edit-btn">編集</button>
        <button type="button" class="btn danger delete-btn">削除</button>
      </div>
    </article>
  </template>

  <dialog id="pinAuthDialog" class="pin-auth-dialog">
    <form id="pinAuthForm" class="pin-auth-form" method="dialog" novalidate>
      <h2>受け取り確認の本人認証</h2>
      <p id="pinAuthReceiverText" class="pin-auth-receiver"></p>
      <label>
        PIN（4桁）
        <input id="pinAuthInput" type="password" maxlength="4" inputmode="numeric" pattern="\d{4}" autocomplete="off" required>
      </label>
      <p id="pinAuthError" class="pin-auth-error" aria-live="polite"></p>
      <div class="pin-auth-actions">
        <button id="pinAuthCancelBtn" type="button" class="btn">キャンセル</button>
        <button id="pinAuthSubmitBtn" type="submit" class="btn primary">認証して確定</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
